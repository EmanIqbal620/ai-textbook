name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: humanoid-robotics-textbook/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./humanoid-robotics-textbook
      
      - name: Build site
        run: npm run build
        working-directory: ./humanoid-robotics-textbook
        env:
          NODE_ENV: production
      
      - name: Install Hugging Face Hub
        run: pip install huggingface_hub
      
      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_DEPLOY_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          huggingface-cli upload \
            --repo-type space \
            $HF_REPO_ID \
            ./humanoid-robotics-textbook/build \
            . \
            --token $HF_TOKEN
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: humanoid-robotics-textbook/build
          retention-days: 7
